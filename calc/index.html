<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="">

  <div class="calculator">

    <div class="calculator_display">
      <input type="text" class="display-input" id="calc-input" autocomplete="off">
    </div>

    <div class="calculator_mode">
      <select name="calc-mode">
        <option value="basic">Basic</option>
        <option value="trigonometry">Trigonometry</option>
      </select>

      <select name="calc-function">
        <option value="function">Function</option>
      </select>

      <select id="theme-selector">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <div class="calculator_buttons">

      <div class="buttons_row">
        <button class="btn memory-btn" data-type="memory" data-value="MC">MC</button>
        <button class="btn memory-btn" data-type="memory" data-value="MR">MR</button>
        <button class="btn memory-btn" data-type="memory" data-value="M+">M+</button>
        <button class="btn memory-btn" data-type="memory" data-value="M-">M-</button>
        <button class="btn memory-btn" data-type="memory" data-value="MS">MS</button>
      </div>

      <div class="buttons_row advanced d-none">
        <button class="btn function-btn" data-type="function" data-value="Math.cos(">cos</button>
        <button class="btn function-btn" data-type="function" data-value="Math.sin(">sin</button>
        <button class="btn function-btn" data-type="function" data-value="Math.tan(">tan</button>
      </div>

      <div class="buttons_row">
        <button class="btn function-btn" data-type="function" data-value="2nd">2<sup>nd</sup></button>
        <button class="btn constant-btn" data-type="constant" data-value="Math.PI">π</button>
        <button class="btn constant-btn" data-type="constant" data-value="Math.e">e</button>
        <button class="btn control-btn" data-type="control" data-value="clear">AC</button>
        <button class="btn control-btn" data-type="control" data-value="backspace">⌫</button>
      </div>

      <div class="buttons_row">
        <button class="btn function-btn" data-type="function" data-value="**2">x<sup>2</sup></button>
        <button class="btn function-btn" data-type="function" data-value="reciprocal">1/x</button>
        <button class="btn function-btn" data-type="function" data-value="Math.abs("> |x| </button>
        <button class="btn function-btn" data-type="function" data-value="Math.exp(">exp</button>
        <button class="btn function-btn" data-type="operator" data-value="%">mod</button>
      </div>

      <div class="buttons_row">
        <button class="btn function-btn" data-type="function" data-value="Math.sqrt(">2&radic;x</button>
        <button class="btn bracket-btn" data-type="bracket" data-value="(">(</button>
        <button class="btn bracket-btn" data-type="bracket" data-value=")">)</button>
        <button class="btn function-btn" data-type="function" data-value="factorial(">n!</button>
        <button class="btn operator-btn" data-type="operator" data-value="/"> &divide; </button>
      </div>

      <div class="buttons_row">
        <button class="btn function-btn" data-type="operator" data-value="**">x<sup>y</sup></button>
        <button class="btn btn-white number-btn" data-type="number" data-value="7">7</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="8">8</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="9">9</button>
        <button class="btn operator-btn" data-type="operator" data-value="*">&times;</button>
      </div>

      <div class="buttons_row">
        <button class="btn function-btn" data-type="operator" data-value="10**">10<sup>x</sup></button>
        <button class="btn btn-white number-btn" data-type="number" data-value="4">4</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="5">5</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="6">6</button>
        <button class="btn operator-btn" data-type="operator" data-value="-">-</button>
      </div>

      <div class="buttons_row">
        <button class="btn function-btn" data-type="function" data-value="Math.log10(">log</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="1">1</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="2">2</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="3">3</button>
        <button class="btn operator-btn" data-type="operator" data-value="+">+</button>
      </div>

      <div class="buttons_row">
        <button class="btn function-btn" data-type="function" data-value="Math.log(">ln</button>
        <button class="btn function-btn" data-type="function" data-value="negate">+/-</button>
        <button class="btn btn-white number-btn" data-type="number" data-value="0">0</button>
        <button class="btn number-btn" data-type="number" data-value=".">.</button>
        <button class="btn equal-btn" data-type="control" data-value="equals">=</button>
      </div>

    </div>
  </div>

  <!-- <script src="./script.js"></script> -->
  <script>
    const themeSelector = document.getElementById('theme-selector');

    themeSelector.addEventListener('change', (e) => {
      if (e.target.value === 'dark') {
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }
    });

    const input = document.getElementById('calc-input');

    document
      .querySelector('select[name="calc-mode"]')
      .addEventListener("change", function () {
        const advanced = document.querySelector(".advanced");

        if (this.value === "trigonometry") {
          advanced.classList.remove("d-none");
        } else {
          advanced.classList.add("d-none");
        }
      });

    document.addEventListener("keydown", (e) => {
      console.log(e.key);
      let pressKey = e.key;
      switch (pressKey) {
        case "1": input.value += pressKey;
      }
    });

    const btns = document.querySelectorAll('.btn');
    btns.forEach(btn =>
      btn.addEventListener("click", (e) => {
        const value = e.currentTarget.dataset.value;
        updateInput(value);
      })
    );

    function updateInput(t) {
      switch (t) {
        case "clear":
          input.value = "";
          break;

        case "backspace":
          input.value = input.value.slice(0, -1);
          break;

        case "equals":
          try {
            const cnt = [...input.value].filter(c => c === '(').length;
            input.value += ')'.repeat(cnt);

            input.value = eval(input.value);
          } catch {
            input.value = "Error";
          }
          break;

        default:
          input.value += t;
          break;
      }
    }


  </script>

</body>

</html>
