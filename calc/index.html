<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

  <div class="calculator">

    <div class="display">
      <input type="text" class="display-input" id="calc-input" autocomplete="off">
    </div>

    <div class="buttons">

      <button class="btn function-btn" data-value="2nd">2<sup>nd</sup></button>
      <button class="btn constant-btn" data-value="3.1416">π</button>
      <button class="btn constant-btn" data-value="2.7183">e</button>
      <button class="btn control-btn" data-value="clear">C</button>
      <button class="btn control-btn" data-value="backspace">⌫</button>

      <button class="btn function-btn" data-value="**2">x<sup>2</sup></button>
      <button class="btn function-btn" data-value="1/">1/x</button>
      <button class="btn function-btn" data-value="abs("> |x| </button>
      <button class="btn function-btn" data-value="exp(">exp</button>
      <button class="btn function-btn" data-value="%">mod</button>

      <button class="btn function-btn" data-value="Math.sqrt(">2&radic;x</button>
      <button class="btn bracket-btn" data-value="(">(</button>
      <button class="btn bracket-btn" data-value=")">)</button>
      <button class="btn function-btn" data-value="factorial(">n!</button>
      <button class="btn operator-btn" data-value="/"> &divide; </button>

      <button class="btn function-btn" data-value="**">x<sup>y</sup></button>
      <button class="btn number-btn" data-value="7">7</button>
      <button class="btn number-btn" data-value="8">8</button>
      <button class="btn number-btn" data-value="9">9</button>
      <button class="btn operator-btn" data-value="*">&times;</button>

      <button class="btn function-btn" data-value="10**">10<sup>x</sup></button>
      <button class="btn number-btn" data-value="4">4</button>
      <button class="btn number-btn" data-value="5">5</button>
      <button class="btn number-btn" data-value="6">6</button>
      <button class="btn operator-btn" data-value="-">-</button>

      <button class="btn function-btn" data-value="Math.log10(">log</button>
      <button class="btn number-btn" data-value="1">1</button>
      <button class="btn number-btn" data-value="2">2</button>
      <button class="btn number-btn" data-value="3">3</button>
      <button class="btn operator-btn" data-value="+">+</button>

      <button class="btn function-btn" data-value="Math.log(">ln</button>
      <button class="btn function-btn" data-value="negate">+/-</button>
      <button class="btn number-btn" data-value="0">0</button>
      <button class="btn number-btn" data-value=".">.</button>
      <button class="btn equal-btn" data-value="equals">=</button>

    </div>

  </div>


  <script>
    const input = document.getElementById('calc-input');
    console.log(input)

    const btns = document.querySelectorAll('.btn');
    btns.forEach(btn =>
      btn.addEventListener("click", (e) => {
        const value = e.currentTarget.dataset.value;
        updateInput(value);
      })
    );

    function updateInput(t) {
      switch (t) {
        case "clear":
          input.value = "";
          break;

        case "backspace":
          input.value = input.value.slice(0, -1);
          break;

        case "equals":
          try {
            input.value = eval(input.value);
          } catch {
            input.value = "Error";
          }
          break;

        default:
          input.value += t;
          break;
      }
    }


  </script>

</body>

</html>
